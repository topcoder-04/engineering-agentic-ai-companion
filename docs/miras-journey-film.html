<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mira's Journey — narrative film</title>
<style>
:root{
  --bg:#070914;--panel:#101524;--ink:#f5f7ff;--muted:#9aa5bc;--line:#273044;
  --cyan:#4bdcff;--green:#63e6a3;--gold:#ffd166;--pink:#ff7bac;--purple:#b792ff;
  --danger:#ff6f91;--glow:rgba(75,220,255,.2)
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink)}
body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit}
#film{position:relative;width:100vw;height:100vh;min-width:960px;min-height:540px;background:
  radial-gradient(circle at 76% 24%,rgba(183,146,255,.08),transparent 28%),
  radial-gradient(circle at 18% 74%,rgba(75,220,255,.06),transparent 30%),
  var(--bg)}
.topbar{position:absolute;z-index:20;top:0;left:0;right:0;height:78px;display:flex;align-items:center;
  justify-content:space-between;padding:0 58px;border-bottom:1px solid rgba(154,165,188,.14);
  background:rgba(7,9,20,.88);backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:16px}.mark{width:38px;height:38px;border-radius:11px;
  display:grid;place-items:center;background:linear-gradient(145deg,var(--cyan),var(--purple));
  color:#07101b;font-weight:900;font-size:20px}
.brand strong{display:block;font-family:Georgia,serif;font-size:22px}.brand small{display:block;color:var(--muted);
  text-transform:uppercase;letter-spacing:.17em;font-size:10px;margin-top:3px}
.top-right{display:flex;align-items:center;gap:22px}.movement{font-size:13px;font-weight:750;letter-spacing:.06em;
  color:var(--accent,var(--cyan));text-transform:uppercase}.clock{font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);
  min-width:74px;text-align:right}
.pause,.sound{width:42px;height:42px;border-radius:50%;border:1px solid color-mix(in srgb,var(--accent,var(--cyan)) 65%,transparent);
  background:rgba(255,255,255,.03);color:var(--ink);cursor:pointer}
.sound{font-size:17px}.sound.off{opacity:.45}
.start-gate{position:absolute;z-index:40;inset:0;display:grid;place-items:center;background:
  radial-gradient(circle at 50% 52%,rgba(75,220,255,.12),transparent 24%),rgba(7,9,20,.78);
  backdrop-filter:blur(9px)}
.start-gate[hidden]{display:none}.start-card{text-align:center}.start-card .mark{margin:0 auto 22px;width:64px;height:64px;
  border-radius:18px;font-size:30px}.start-card h1{margin:0;font:700 clamp(38px,4vw,64px)/1.05 Georgia,serif}
.start-card p{margin:15px 0 28px;color:var(--muted);font-size:18px}.start-card button{padding:14px 24px;border-radius:999px;
  border:1px solid var(--cyan);background:rgba(75,220,255,.1);color:var(--ink);font-weight:800;cursor:pointer}
.stage{position:absolute;inset:78px 0 58px}
.scene{position:absolute;inset:0;padding:62px 100px 48px;opacity:0;visibility:hidden;
  transform:translateY(10px) scale(.997);transition:opacity .45s ease,transform .45s ease,visibility 0s .45s}
.scene.active{opacity:1;visibility:visible;transform:none;transition-delay:0s}
.copy{position:relative;z-index:3;max-width:760px}.eyebrow{color:var(--accent);font-size:13px;font-weight:800;
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:15px}.scene h1{margin:0;font-family:Georgia,serif;
  font-size:clamp(42px,4vw,72px);line-height:1.05;letter-spacing:-.025em;max-width:960px}
.scene .lead{margin:20px 0 0;color:#b7c1d6;font-size:clamp(18px,1.45vw,26px);line-height:1.48;max-width:780px}
.visual{position:absolute;z-index:2;left:88px;right:88px;top:250px;bottom:54px;display:grid;place-items:center}
.visual svg{width:100%;height:100%;overflow:visible}
.scene.active .enter{animation:enter .42s cubic-bezier(.2,.8,.2,1) both;animation-delay:min(var(--d,0s),.55s)}
.scene.active .draw{animation:link-in .55s cubic-bezier(.2,.8,.2,1) both;animation-delay:min(var(--d,.2s),.45s);transform-box:fill-box;transform-origin:center}
.scene.active .pulse{animation:pulse 2.6s ease-in-out infinite;animation-delay:var(--d,0s)}
.scene.active .float{animation:float 4s ease-in-out infinite;animation-delay:var(--d,0s)}
.scene.active .blink{animation:blink 2s ease-in-out infinite;animation-delay:var(--d,0s)}
@keyframes enter{from{opacity:0;transform:translateY(14px) scale(.975)}to{opacity:1;transform:none}}
@keyframes link-in{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.55;filter:none}50%{opacity:1;filter:drop-shadow(0 0 12px currentColor)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes blink{0%,70%,100%{opacity:1}80%{opacity:.25}}
.node{fill:#111827;stroke:#3a465e;stroke-width:2}.node.active-node{stroke:var(--accent);filter:drop-shadow(0 0 10px color-mix(in srgb,var(--accent) 42%,transparent))}
.soft{fill:rgba(255,255,255,.025);stroke:#2a3449;stroke-width:2}.label{fill:#f5f7ff;font:700 17px Inter,system-ui,sans-serif}
.small{fill:#99a5bd;font:600 12px Inter,system-ui,sans-serif;letter-spacing:.04em}.tiny{fill:#7f8ba3;font:600 10px Inter,system-ui,sans-serif;letter-spacing:.08em}
.mono{fill:#d7deef;font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace}.accent{fill:var(--accent)}.good{fill:var(--green)}.bad{fill:var(--danger)}
.wire{fill:none;stroke:#3b465e;stroke-width:3;marker-end:url(#arrow-neutral)}.wire-accent{fill:none;stroke:var(--accent);stroke-width:4;marker-end:url(#arrow-accent)}.wire-good{fill:none;stroke:var(--green);stroke-width:4;marker-end:url(#arrow-good)}
.wire-bad{fill:none;stroke:var(--danger);stroke-width:4;stroke-dasharray:10 10;marker-end:url(#arrow-bad)}.screen{fill:#0b1020;stroke:#34415a;stroke-width:2}
.tag{fill:rgba(255,255,255,.04);stroke:#34415a;stroke-width:1.5}.window{fill:#263149;stroke:#465572;stroke-width:1.5}
.window.lit{fill:var(--gold);stroke:#ffe7a2;filter:drop-shadow(0 0 8px rgba(255,209,102,.65))}
.big-word{fill:#f5f7ff;font:800 28px Inter,system-ui,sans-serif;letter-spacing:.01em}.question{fill:var(--accent);font:800 22px Inter,system-ui,sans-serif}
.footer{position:absolute;z-index:20;left:0;right:0;bottom:0;height:58px;border-top:1px solid rgba(154,165,188,.14);
  background:rgba(7,9,20,.94);display:flex;align-items:center;padding:0 58px;gap:24px}
.progress{height:5px;flex:1;border-radius:999px;background:#20283a;overflow:hidden}.progress i{display:block;width:0;height:100%;
  border-radius:inherit;background:linear-gradient(90deg,var(--cyan) 0 19%,var(--green) 19% 38%,var(--gold) 38% 57%,var(--pink) 57% 76%,var(--purple) 76% 100%)}
.count{font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);min-width:90px}
.movement-rail{position:absolute;z-index:5;right:100px;top:62px;display:flex;gap:8px}.movement-rail span{width:48px;height:5px;border-radius:9px;background:#263047}
.movement-rail span.on:nth-child(1){background:var(--cyan)}.movement-rail span.on:nth-child(2){background:var(--green)}
.movement-rail span.on:nth-child(3){background:var(--gold)}.movement-rail span.on:nth-child(4){background:var(--pink)}
.movement-rail span.on:nth-child(5){background:var(--purple)}
.opening .copy{display:none}.opening .visual{top:120px}.opening .ground{stroke:#3b465e;stroke-width:3}.opening .spark{fill:var(--cyan)}
@media(max-width:1100px){.scene{padding-left:56px;padding-right:56px}.visual{left:42px;right:42px}.topbar,.footer{padding-left:34px;padding-right:34px}}
</style>
</head>
<body>
<main id="film" aria-label="Mira's Journey narrative film">
  <div id="startGate" class="start-gate">
    <div class="start-card">
      <span class="mark">M</span>
      <h1>Mira's Journey</h1>
      <p>The voice and the visual will begin together.</p>
      <button id="startWithVoice" type="button">Start with narration</button>
    </div>
  </div>
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#3b465e"/></marker>
      <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="var(--accent)"/></marker>
      <marker id="arrow-good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#63e6a3"/></marker>
      <marker id="arrow-bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#ff6f91"/></marker>
    </defs>
  </svg>
  <header class="topbar">
    <div class="brand"><span class="mark">M</span><div><strong>Mira's Journey</strong><small>Narrated browser edition · from useful answers to dependable work</small></div></div>
    <div class="top-right"><span id="movement" class="movement">The incident</span><span id="clock" class="clock">00:00</span><button id="sound" class="sound" type="button" aria-label="Mute narration" title="Mute narration (M)">🔊</button><button id="pause" class="pause" type="button" aria-label="Play">▶</button></div>
  </header>
  <div id="stage" class="stage"></div>
  <footer class="footer"><span id="count" class="count">OPENING</span><div class="progress"><i id="progress"></i></div></footer>
</main>
<script>
const TOTAL = 436500;
const scenes = [
  {id:"opening",start:0,end:1000,m:0,movement:"The incident",eyebrow:"",title:"",lead:""},
  {id:"incident",start:1000,end:37500,m:0,movement:"The incident",eyebrow:"2:05 p.m. · Orders",title:"A good answer is not the work",lead:"The explanation sounds plausible. The investigation is still unfinished."},
  {id:"controlled",start:37500,end:60000,m:1,movement:"Controlled Work",eyebrow:"Draw the boundary",title:"The model proposes. Code decides.",lead:"Ready options enter the decision surface. Only admitted work can run."},
  {id:"checkpoint",start:60000,end:83000,m:1,movement:"Controlled Work",eyebrow:"Keep judgment bounded",title:"The workflow can stop—and continue",lead:"Budget, fallback, and a checkpoint turn a fragile answer into controlled work."},
  {id:"messy",start:83000,end:101500,m:2,movement:"Reliable Work",eyebrow:"Production arrives",title:"Controlled work is not yet reliable",lead:"Requests repeat. Replies disappear. Workers overlap. Dependencies fail."},
  {id:"reliability",start:101500,end:132000,m:2,movement:"Reliable Work",eyebrow:"Refuse to guess",title:"Uncertainty becomes explicit",lead:"Stable effect identity makes retry safe. Reconciliation discovers what actually happened."},
  {id:"integrity",start:132000,end:163500,m:2,movement:"Reliable Work",eyebrow:"Keep the question in charge",title:"The investigation survives failure",lead:"Bounded memory, ownership, evidence envelopes, and a sandbox preserve its shape."},
  {id:"governance-gap",start:163500,end:182500,m:3,movement:"Governed Effects",eyebrow:"The next boundary",title:"Reliable does not mean allowed",lead:"Who may approve? Whose authority is carried? Which policy must hold at the write?"},
  {id:"judgment",start:182500,end:210500,m:3,movement:"Governed Effects",eyebrow:"Use judgment deliberately",title:"Evidence changes the plan",lead:"Models fit decisions. New facts replace only future work. Specialists must support one claim."},
  {id:"effect-gate",start:210500,end:245500,m:3,movement:"Governed Effects",eyebrow:"Move governance into the path",title:"The effect earns permission",lead:"Approval, authority, and policy are checked again where the report is written."},
  {id:"trace-gap",start:245500,end:262000,m:4,movement:"Judged Operations",eyebrow:"The result can still mislead",title:"A good report may hide a bad journey",lead:"The next question is not just what the system produced, but how it got there."},
  {id:"evaluation",start:262000,end:288000,m:4,movement:"Judged Operations",eyebrow:"Judge the route",title:"The trajectory becomes evidence",lead:"Trace connects evidence, decisions, joins, and effects. Release requires the whole path to hold."},
  {id:"feedback",start:288000,end:315500,m:4,movement:"Judged Operations",eyebrow:"Let production teach",title:"Failures become new boundaries",lead:"Variation finds missed cases. Incidents become invariants, regressions, and owned fixes."},
  {id:"platform-gap",start:315500,end:333500,m:5,movement:"Operable Platform",eyebrow:"The problem changes",title:"One safe agent is not a platform",lead:"The same boundaries must hold across teams, agents, versions, and releases."},
  {id:"platform",start:333500,end:360000,m:5,movement:"Operable Platform",eyebrow:"Know what is running",title:"Identity meets authority and placement",lead:"Exact artifacts declare capabilities, carry the caller, and keep evidence in bounds."},
  {id:"launch",start:360000,end:397000,m:5,movement:"Operable Platform",eyebrow:"Convenience is not proof",title:"Launch must be earned",lead:"Evaluation, ownership, rollback, authority, placement, and risk converge on one decision."},
  {id:"outlive",start:397000,end:418000,m:5,movement:"Operable Platform",eyebrow:"Six months later",title:"The work outlives Mira",lead:"A new engineer can reconstruct the investigation because its reasoning lives in the system."},
  {id:"invitation",start:418000,end:436500,m:5,movement:"Run the examples",eyebrow:"One executable boundary at a time",title:"Do not stop at the picture",lead:"Read the journey. Run both sides of every boundary. Break one condition and watch the system refuse."}
];
const narration = {
  incident: `At 2:05 p.m., Orders begins timing out. Mira has enough evidence to sound convincing: application CPU looks normal, while database writes are suddenly slow. A model can turn that into a polished explanation in seconds. But a polished explanation does not finish the investigation. Mira still needs to know what is missing, what actually ran, and whether the report was updated. This book begins in that gap.`,
  controlled: `Mira draws a boundary around what the investigation may touch. The model chooses among ready options, but code decides what is admitted and executed. New evidence can change the task graph. The model cannot invent work simply because it sounds useful.`,
  checkpoint: `Judgment also needs limits. Mira gives it a budget and a fallback, then checkpoints the graph, evidence, and remaining work. A crash no longer erases the investigation. By the end of this first layer, a useful answer has become a controlled workflow.`,
  messy: `One idea now holds the system together: the model may be flexible because the boundary is not. But production is messy. Requests repeat, replies disappear, workers overlap, and dependencies cannot always be trusted.`,
  reliability: `After a restart, Mira sees a report update that may already have succeeded. A stable effect identity makes retry safe. When a reply is lost, the outcome is recorded as unknown—not guessed to be a failure. The system reconciles with the authoritative source before deciding what to do next. Reliability starts by being honest about uncertainty.`,
  integrity: `Old incidents can help, but only as bounded memory, never as fresh evidence. A task spine keeps the original question in charge. Claims prevent two workers from owning the same result. Dependency output is treated as untrusted evidence, and generated analysis runs inside a sandbox. The investigation can now survive the ordinary failures of production without losing its shape.`,
  "governance-gap": `Mira has made the workflow reliable. That still does not answer the harder questions: who may approve an effect, whose authority is being used, and which policy must hold when the write actually happens?`,
  judgment: `Not every choice needs the strongest model. Mira matches the model to the decision and the data it must handle. Plans name the evidence behind them, so new facts can replace only future work. Specialists may contribute pieces, but their results count only when they fit together and support the same claim.`,
  "effect-gate": `Consequential work can wait for a person, but the exact intent is frozen before approval. Authority is checked for this caller, this action, and this resource. Policy reads facts instead of persuasive wording. Then, at the report write, current facts are checked again, obligations are applied, and a receipt is recorded. Governance is no longer advice around the workflow. It is part of the effect path.`,
  "trace-gap": `Orders can now produce a governed effect. But a correct-looking report may still come from an unsafe path. The next layer judges the journey, not just the final sentence.`,
  evaluation: `A semantic trace connects evidence, decisions, joins, and effects without exposing their contents. Evaluation can now judge the complete trajectory. Safety and performance gate separately, so a better average cannot hide a serious regression. A candidate reaches release only after it proves the boundaries it claims to preserve.`,
  feedback: `In production, redacted events show where investigations abandon or refuse. Variation tests explore combinations the authored cases missed. When an incident still occurs, it becomes a missing invariant, a regression case, and an owned fix. Fleet routing then places work only where location, authority, version, capacity, and rollout rules all agree.`,
  "platform-gap": `Mira's problem has changed. She is no longer protecting one Orders investigation. She needs the same hard-won boundaries to hold across teams, agents, and releases—without every team rebuilding them differently.`,
  platform: `The platform starts with identity: one exact combination of prompt, tools, policy, and evaluations. Capabilities are declared and centrally admitted. Every run carries the caller's authority instead of borrowing a powerful platform account. Tenant, region, data class, and retention rules decide where the evidence may run and live.`,
  launch: `The safe path becomes the easy path, but convenience is not proof. A conformance receipt binds evaluation to the artifact being released. A named operator, runbook, rollback path, and budget owner remain attached after launch. Compatibility rules let the platform evolve without breaking every team. Finally, risk becomes executable evidence. A consequential agent launches only when its evaluation, ownership, rollback, caller authority, and placement match the harm it could cause.`,
  outlive: `Six months later, a new on-call engineer opens the Orders investigation. They never met Mira, but its evidence, decisions, approvals, receipts, and ownership are still connected. The work outlives its builder because the reasoning lives in the system.`,
  invitation: `This is not an architecture poster. Every boundary runs both ways: success and refusal. The book shows how an agent earns trust, one boundary at a time.`
};
const colors=["#4bdcff","#4bdcff","#63e6a3","#ffd166","#ff7bac","#b792ff"];

function box(x,y,w,h,title,sub,cls="",delay=0){
  return `<g class="enter ${cls}" style="--d:${delay}s"><rect class="node ${cls.includes("hot")?"active-node":""}" x="${x}" y="${y}" width="${w}" height="${h}" rx="16"/><text class="label" x="${x+20}" y="${y+31}">${title}</text>${sub?`<text class="small" x="${x+20}" y="${y+53}">${sub}</text>`:""}</g>`;
}
function line(x1,y1,x2,y2,cls="wire",delay=.2){return `<path class="${cls} draw" style="--d:${delay}s" d="M${x1} ${y1} L${x2} ${y2}"/>`}
function pill(x,y,w,text,cls="tag",delay=0){return `<g class="enter" style="--d:${delay}s"><rect class="${cls}" x="${x}" y="${y}" width="${w}" height="34" rx="17"/><text class="small" x="${x+w/2}" y="${y+22}" text-anchor="middle">${text}</text></g>`}
function visual(id){
  const open=`<svg viewBox="0 0 1720 650"><path class="ground draw" d="M120 510 H1600"/><circle class="spark pulse" cx="180" cy="500" r="7"/><text class="tiny enter" x="120" y="548" style="--d:.25s">ORDERS · 2:05 P.M.</text></svg>`;
  if(id==="opening") return open;
  if(id==="incident") return `<svg viewBox="0 0 1720 650">
    ${box(95,145,310,180,"ORDERS TIMEOUTS","18% of requests","hot pulse",.1)}
    <path class="wire-accent draw" style="--d:.4s" d="M405 235 C505 235 520 235 610 235"/>
    ${box(610,115,430,240,"MODEL ANSWER","“Database pressure is delaying orders.”","",.55)}
    <g class="enter" style="--d:.9s"><rect class="screen" x="1140" y="92" width="465" height="330" rx="20"/>
      <text class="tiny" x="1180" y="132">INVESTIGATION STATUS</text>
      <text class="small" x="1180" y="182">Known evidence</text><text class="good" x="1545" y="182">●</text>
      <text class="small" x="1180" y="228">Activity causing delay</text><text class="bad blink" x="1545" y="228">?</text>
      <text class="small" x="1180" y="274">Workload owner</text><text class="bad blink" x="1545" y="274">?</text>
      <text class="small" x="1180" y="320">Launch mechanism</text><text class="bad blink" x="1545" y="320">?</text>
      <text class="small" x="1180" y="366">Report update</text><text class="bad" x="1518" y="366">NOT RUN</text>
    </g>
    <text class="question enter" x="610" y="520" style="--d:1.2s">PLAUSIBLE ≠ COMPLETE</text>
  </svg>`;
  if(id==="controlled") return `<svg viewBox="0 0 1720 650">
    <rect class="soft draw" x="125" y="120" width="1470" height="360" rx="44"/>
    <text class="tiny accent" x="155" y="155">PERMITTED INVESTIGATION BOUNDARY</text>
    ${box(205,225,260,120,"OBSERVE","scoped evidence","hot",.2)}
    ${line(465,285,640,285,"wire-accent",.4)}${box(640,225,260,120,"PROPOSE","model choice","hot",.55)}
    ${line(900,285,1075,285,"wire-accent",.7)}${box(1075,225,260,120,"ADMIT","typed contract","hot",.85)}
    ${line(1335,285,1490,285,"wire-good",1.0)}
    <g class="enter" style="--d:1.15s"><circle class="node active-node" cx="1530" cy="285" r="55"/><text class="label" x="1530" y="291" text-anchor="middle">RUN</text></g>
    ${pill(670,405,200,"ready options only","tag",1.25)}${pill(1105,405,200,"code decides","tag",1.4)}
  </svg>`;
  if(id==="checkpoint") return `<svg viewBox="0 0 1720 650">
    ${box(135,210,280,130,"JUDGMENT","one next action","hot",.1)}
    ${line(415,275,610,275,"wire-accent",.3)}
    <g class="enter" style="--d:.45s"><circle class="node active-node" cx="720" cy="275" r="90"/><text class="tiny" x="720" y="250" text-anchor="middle">BUDGET</text><text class="big-word" x="720" y="292" text-anchor="middle">3 / 4</text><path class="wire-accent" d="M665 324 A76 76 0 0 0 775 324"/></g>
    ${line(810,275,1005,275,"wire-accent",.65)}${box(1005,205,320,140,"CHECKPOINT","graph · evidence · work","hot",.8)}
    <g class="enter blink" style="--d:1.05s"><path d="M1385 170 l-42 74 h38 l-18 88 62-101 h-40z" fill="#ff7bac"/><text class="small" x="1350" y="370">process stops</text></g>
    <path class="wire-good draw" style="--d:1.35s" d="M1325 275 C1450 275 1470 420 1290 455 H525 C390 455 350 365 415 310"/>
    <text class="question enter" x="765" y="505" text-anchor="middle" style="--d:1.55s">RESUME FROM RECORDED TRUTH</text>
  </svg>`;
  if(id==="messy") return `<svg viewBox="0 0 1720 650">
    ${box(120,205,260,130,"REQUEST","update report","",.1)}${box(120,360,260,130,"REQUEST","same update again","",.25)}
    ${line(380,270,615,270,"wire-bad",.4)}${line(380,425,615,305,"wire-bad",.5)}
    ${box(615,210,300,140,"WORKER A","effect may succeed","hot",.55)}
    ${box(615,390,300,120,"WORKER B","owns same work?","",.7)}
    <g class="enter blink" style="--d:.9s"><path class="wire-bad" d="M915 280 C1060 280 1090 210 1190 210"/><text class="bad" x="1040" y="190">REPLY LOST</text></g>
    ${box(1190,145,330,130,"DEPENDENCY","timeout","",1.0)}${box(1190,360,330,130,"OUTCOME","unknown","hot pulse",1.2)}
    <text class="question enter" x="855" y="575" text-anchor="middle" style="--d:1.4s">DO NOT TURN MESS INTO A GUESS</text>
  </svg>`;
  if(id==="reliability") return `<svg viewBox="0 0 1720 650">

const stage=document.getElementById("stage");
for(const s of scenes){
  const section=document.createElement("section");
  section.className=`scene ${s.id==="opening"?"opening":""}`;
  section.dataset.id=s.id;
  section.innerHTML=`<div class="movement-rail">${[1,2,3,4,5].map(n=>`<span class="${n<=s.m?"on":""}"></span>`).join("")}</div>
    <div class="copy"><div class="eyebrow">${s.eyebrow}</div><h1>${s.title}</h1><p class="lead">${s.lead}</p></div>
    <div class="visual">${visual(s.id)}</div>`;
  stage.append(section);
}
const els=[...document.querySelectorAll(".scene")], clock=document.getElementById("clock"), progress=document.getElementById("progress"),
  movement=document.getElementById("movement"), count=document.getElementById("count"), pause=document.getElementById("pause"),
  sound=document.getElementById("sound"), startGate=document.getElementById("startGate"),
  startWithVoice=document.getElementById("startWithVoice");
const params=new URLSearchParams(location.search);
const speech=("speechSynthesis" in window)&&("SpeechSynthesisUtterance" in window);
let voiceEnabled=speech&&params.get("voice")!=="0";
let preferredVoice=null,lastSpoken=-1,activeUtterance=null;
let startedAt=0,elapsed=0,running=false,raf=0,current=-1;

function chooseVoice(){
  if(!speech)return null;
  const voices=window.speechSynthesis.getVoices();
  const requested=params.get("voice");
  const priorities=requested?[requested]:["Ava","Samantha","Microsoft Aria","Google US English","Daniel","Karen"];
  preferredVoice=priorities.map(name=>voices.find(v=>v.name.toLowerCase().includes(name.toLowerCase())))
    .find(Boolean)||voices.find(v=>/^en[-_]/i.test(v.lang))||voices[0]||null;
  return preferredVoice;
}
function updateSound(){
  sound.textContent=voiceEnabled?"🔊":"🔇";
  sound.classList.toggle("off",!voiceEnabled);
  sound.setAttribute("aria-label",voiceEnabled?"Mute narration":"Enable narration");
}
function cancelNarration(){
  if(!speech)return;
  window.speechSynthesis.cancel();
  activeUtterance=null;
}
function speakScene(idx,force=false){
  if(!voiceEnabled||!speech||idx===0||!narration[scenes[idx].id]||(!force&&lastSpoken===idx))return;
  cancelNarration();
  lastSpoken=idx;
  const utterance=new SpeechSynthesisUtterance(narration[scenes[idx].id]);
  utterance.lang="en-US";
  utterance.rate=Math.max(.55,Math.min(1.1,Number(params.get("rate"))||.78));
  utterance.pitch=1;
  utterance.volume=1;
  utterance.voice=preferredVoice||chooseVoice();
  utterance.onend=()=>{if(activeUtterance===utterance)activeUtterance=null};
  utterance.onerror=()=>{if(activeUtterance===utterance)activeUtterance=null};
  activeUtterance=utterance;
  window.speechSynthesis.speak(utterance);
}
function fmt(ms){const sec=Math.floor(ms/1000);return `${String(Math.floor(sec/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`}
function render(ms){
  const sceneTime=Math.min(ms,TOTAL-1);
  const idx=Math.max(0,scenes.findIndex(s=>sceneTime>=s.start&&sceneTime<s.end));
  if(idx!==current){els.forEach((e,i)=>e.classList.toggle("active",i===idx));current=idx;movement.textContent=scenes[idx].movement;
    document.documentElement.style.setProperty("--accent",colors[scenes[idx].m]);count.textContent=idx===0?"OPENING":`${String(idx).padStart(2,"0")} / 17`;
    if(running)speakScene(idx);}
  clock.textContent=fmt(ms);progress.style.width=`${Math.min(100,ms/TOTAL*100)}%`;
}
function tick(now){if(!running)return;elapsed=Math.min(TOTAL,now-startedAt);render(elapsed);if(elapsed<TOTAL)raf=requestAnimationFrame(tick);else stop(true)}
function start(){
  if(running)return;
  if(elapsed>=TOTAL){elapsed=0;current=-1;lastSpoken=-1}
  startedAt=performance.now()-elapsed;
  running=true;
  pause.textContent="Ⅱ";
  pause.setAttribute("aria-label","Pause");
  if(speech&&window.speechSynthesis.paused)window.speechSynthesis.resume();
  else speakScene(current,true);
  raf=requestAnimationFrame(tick);
}
function stop(done=false){
  running=false;
  cancelAnimationFrame(raf);
  if(speech){
    if(done)cancelNarration();
    else window.speechSynthesis.pause();
  }
  pause.textContent=done?"↻":"▶";
  pause.setAttribute("aria-label",done?"Replay":"Play");
}
function toggle(){running?stop():start()}
function seek(ms){
  cancelNarration();
  lastSpoken=-1;
  current=-1;
  elapsed=Math.max(0,Math.min(TOTAL-1,ms));
  if(running)startedAt=performance.now()-elapsed;
  render(elapsed);
}
function toggleSound(){
  voiceEnabled=!voiceEnabled;
  cancelNarration();
  lastSpoken=-1;
  updateSound();
  if(voiceEnabled&&running)speakScene(current,true);
}
function begin(){
  startGate.hidden=true;
  seek(0);
  start();
}
pause.addEventListener("click",()=>startGate.hidden?toggle():begin());
sound.addEventListener("click",toggleSound);
startWithVoice.addEventListener("click",begin);
window.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();toggle()}
  else if(e.key==="ArrowRight"){e.preventDefault();seek(scenes[Math.min(scenes.length-1,current+1)].start)}
  else if(e.key==="ArrowLeft"){e.preventDefault();seek(scenes[Math.max(0,current-1)].start)}
  else if(e.key.toLowerCase()==="r"){e.preventDefault();seek(0);start()}
  else if(e.key.toLowerCase()==="m"){e.preventDefault();toggleSound()}
});
if(speech){
  chooseVoice();
  window.speechSynthesis.addEventListener?.("voiceschanged",chooseVoice);
}
updateSound();
window.MIRA_FILM=Object.freeze({durationMs:TOTAL,width:1920,height:1080,fps:30,start,seek,toggleSound});
render(0);
if(params.get("autoplay")==="1"||(!voiceEnabled&&params.get("autoplay")!=="0")){
  startGate.hidden=true;
  requestAnimationFrame(start);
}
