<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Follow one Orders incident through 37 chapters, from a useful answer to a system another team can run and trust.">
<title>Mira's Journey — Engineering Agentic AI</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #080b14;
    --panel: #0e1524;
    --ink: #f5f7ff;
    --muted: #a5aec2;
    --faint: #737d93;
    --line: rgba(255,255,255,.12);
    --c1: #55d9ff; --c2: #63e59a; --c3: #ffd166; --c4: #ff82aa; --c5: #b99aff;
    --bad: #ff7a8f;
    --mv: #55d9ff;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); }
  body { color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  a { color: inherit; }

  .app {
    display: grid; grid-template-rows: 62px minmax(0,1fr) 74px;
    width: 100vw; height: 100dvh; min-height: 640px; overflow: hidden;
    background:
      radial-gradient(circle at 8% 12%, rgba(85,217,255,.06), transparent 28rem),
      radial-gradient(circle at 92% 8%, rgba(185,154,255,.06), transparent 28rem),
      var(--bg);
  }

  /* ================= header ================= */
  header { display: grid; grid-template-columns: minmax(225px,.9fr) minmax(560px,2fr) auto; gap: 18px; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--line); background: rgba(8,11,20,.95); }
  .brand { min-width: 0; }
  .brand strong { display: block; overflow: hidden; font-family: var(--serif); font-size: .95rem; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; }
  .brand strong em { font-style: italic; color: var(--mv); }
  .brand small { display: block; margin-top: 2px; color: var(--faint); font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; }
  .tabs { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
  .tabs button { display: flex; gap: 8px; align-items: center; min-width: 0; padding: 7px 9px; border: 1px solid transparent; border-radius: 10px; color: #626c82; text-align: left; }
  .tabs button:hover, .tabs button:focus-visible { border-color: var(--line); outline: none; }
  .tabs button.progressed { color: #adb6c9; }
  .tabs button.current { color: var(--ink); background: color-mix(in srgb, var(--tab) 10%, transparent); border-color: color-mix(in srgb, var(--tab) 35%, transparent); }
  .tabs .key { flex: 0 0 auto; display: grid; place-items: center; width: 17px; height: 17px; border: 1px solid color-mix(in srgb, var(--tab) 60%, transparent); border-radius: 5px; color: var(--tab); font-family: var(--mono); font-size: .58rem; }
  .tabs .t-copy { min-width: 0; }
  .tabs .t-copy b, .tabs .t-copy span { display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .tabs .t-copy b { font-size: .64rem; }
  .tabs .t-copy span { margin-top: 1px; opacity: .6; font-size: .52rem; }
  .stepper { display: flex; align-items: center; gap: 7px; }
  .stepper span { min-width: 58px; text-align: center; font-family: var(--mono); font-size: .66rem; color: var(--muted); }
  .stepper button { display: grid; place-items: center; width: 36px; height: 36px; border: 1px solid var(--mv); border-radius: 50%; background: color-mix(in srgb, var(--mv) 12%, transparent); font-weight: 900; }
  .stepper button:hover, .stepper button:focus-visible { background: color-mix(in srgb, var(--mv) 25%, transparent); outline: none; }
  .stepper button:disabled { border-color: var(--line); color: var(--faint); background: transparent; cursor: not-allowed; }
  .stepper .play { display: block; width: auto; min-width: 92px; padding: 0 12px; border-radius: 999px; font-size: .6rem; letter-spacing: .02em; white-space: nowrap; }

  /* ================= main ================= */
  main { display: grid; grid-template-columns: 262px minmax(0,1fr); min-height: 0; }
  .rail { display: flex; flex-direction: column; min-height: 0; padding: 14px 12px 12px 18px; border-right: 1px solid var(--line); background: rgba(10,14,24,.55); }
  .mv-roman { font-family: var(--serif); color: var(--mv); font-size: 1.4rem; line-height: 1; }
  .mv-name { margin: 4px 0 0; font-family: var(--serif); font-size: .9rem; font-weight: 600; line-height: 1.25; }
  .mv-question { margin: 7px 0 10px; font-family: var(--serif); font-style: italic; color: var(--mv); font-size: .68rem; line-height: 1.45; }
  .rail-list { display: flex; flex-direction: column; gap: 3px; min-height: 0; overflow-y: auto; margin: 0 -4px; padding: 2px 4px; }
  .rail-item { display: flex; gap: 9px; align-items: center; padding: 5px 8px; border: 1px solid transparent; border-radius: 9px; color: var(--muted); text-align: left; }
  .rail-item:hover, .rail-item:focus-visible { border-color: var(--line); outline: none; }
  .rail-item.current { color: var(--ink); background: color-mix(in srgb, var(--mv) 10%, transparent); border-color: color-mix(in srgb, var(--mv) 40%, transparent); }
  .rail-item .num { flex: 0 0 auto; display: grid; place-items: center; width: 21px; height: 21px; border: 1.5px solid var(--mv); border-radius: 50%; font-family: var(--mono); font-size: .55rem; color: var(--mv); }
  .rail-item.passed .num { background: color-mix(in srgb, var(--mv) 24%, transparent); }
  .rail-item.waypoint .num { border-radius: 5px; transform: rotate(45deg); }
  .rail-item.waypoint .num span { transform: rotate(-45deg); }
  .rail-item b { overflow: hidden; font-size: .65rem; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; }
  .rail-setup { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }

  .detail { display: flex; flex-direction: column; min-width: 0; min-height: 0; padding: 18px 26px 14px; overflow-y: auto; }
  .ch-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .ch-meta .chip { font-family: var(--mono); font-size: .6rem; color: var(--mv); }
  .ch-meta .mv-of { color: var(--faint); font-size: .6rem; }
  .refusal { margin-left: auto; padding: 4px 10px; border: 1px solid color-mix(in srgb, var(--mv) 45%, transparent); border-radius: 8px; background: color-mix(in srgb, var(--mv) 8%, transparent); font-size: .6rem; white-space: nowrap; }
  .refusal b { color: var(--mv); font-weight: 800; }
  h1.lesson { margin: 8px 0 0; font-family: var(--serif); font-size: clamp(1.65rem, 3.2vw, 2.25rem); font-weight: 600; letter-spacing: -.01em; line-height: 1.12; }
  .story { margin: 10px 0 0; padding-left: 12px; border-left: 3px solid var(--mv); max-width: 76ch; }
  .story .cap { display: block; margin-bottom: 3px; color: var(--mv); font-size: .56rem; font-weight: 800; letter-spacing: .16em; }
  .story p { margin: 0; font-family: var(--serif); font-style: italic; color: var(--ink); font-size: 1.04rem; line-height: 1.55; }
  .change { margin: 11px 0 0; color: var(--muted); font-size: .91rem; line-height: 1.62; max-width: 78ch; }
  .change b { color: var(--ink); font-weight: 650; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .badge { padding: 3px 9px; border: 1px dashed; border-radius: 7px; font-family: var(--mono); font-size: .58rem; }
  .b-req { border-color: var(--c3); color: var(--c3); }
  .b-opt { border-color: var(--faint); color: var(--muted); }

  /* the building */
  .viz { flex: 1; display: grid; place-items: center; min-height: 230px; margin-top: 10px; }
  .viz svg { width: min(1220px, 100%); height: auto; max-height: 100%; overflow: visible; }
  .viz .seg { cursor: pointer; }
  .viz .seg-prior { opacity: .66; }
  .viz .seg rect.blk { fill: #0d1322; fill-opacity: .96; stroke-width: 1.2; transition: stroke-width .15s ease; }
  .viz .seg:hover rect.blk { stroke-width: 2; }
  .viz .seg-current rect.blk { stroke: #fff !important; stroke-width: 1.8; filter: drop-shadow(0 0 7px var(--mv)); }
  .viz .seg-arrive { transform-box: fill-box; transform-origin: center; animation: bpdrop .65s cubic-bezier(.25,.9,.3,1.15) both; }
  @keyframes bpdrop {
    0% { transform: translateY(-52px); opacity: 0; }
    45% { opacity: 1; }
    80% { transform: translateY(3px); }
    100% { transform: translateY(0); opacity: 1; }
  }
  .viz .bp-label { font-size: 8px; font-weight: 650; text-anchor: middle; pointer-events: none; }
  .viz .bp-label.long { font-size: 7px; }
  .viz .seg-current .bp-label { fill: #fff !important; font-weight: 800; }
  .viz .win { fill: #0a0f1b; stroke: rgba(255,255,255,.22); stroke-width: .7; }
  .viz .win.lit { fill: var(--c3); stroke: var(--c3); filter: drop-shadow(0 0 3px var(--c3)); }
  .viz .ground { stroke: rgba(255,255,255,.4); stroke-width: 1.4; stroke-dasharray: 1 0; }
  .viz .soil { fill: rgba(255,255,255,.035); }
  .viz .soil-hatch { stroke: rgba(255,255,255,.06); stroke-width: 1; }
  .viz .beacon { fill: var(--bad); filter: drop-shadow(0 0 5px var(--bad)); animation: blink 1.6s ease-in-out infinite; }
  .viz .beacon.go { fill: var(--c2); filter: drop-shadow(0 0 6px var(--c2)); }
  @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  .viz .floor-cap { font-size: 7.3px; font-weight: 800; letter-spacing: 1.05px; text-anchor: end; }
  .viz .lane-cap { font-size: 7.3px; font-weight: 800; letter-spacing: 1.15px; }
  .viz .legend-cap { font-size: 9px; font-weight: 800; letter-spacing: .9px; }
  .viz .legend-sub { font-size: 9.5px; fill: var(--muted); }
  @media (prefers-reduced-motion: reduce) { .viz .seg-arrive, .viz .beacon { animation: none; } }

  /* try yourself (collapsed) */
  details.try { margin-top: auto; border: 1px solid var(--line); border-radius: 12px; background: rgba(10,15,27,.6); }
  details.try summary { display: flex; align-items: center; gap: 9px; padding: 9px 14px; color: var(--muted); font-size: .66rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; list-style: none; user-select: none; }
  details.try summary::-webkit-details-marker { display: none; }
  details.try summary::before { content: "▸"; color: var(--mv); transition: transform .15s ease; }
  details[open].try summary::before { transform: rotate(90deg); }
  details.try summary:hover { color: var(--ink); }
  details.try summary .hint { margin-left: auto; color: var(--faint); font-size: .58rem; font-weight: 600; letter-spacing: 0; text-transform: none; }
  .ex-body { padding: 0 14px 12px; }
  .ex-hint { margin: 0 0 7px; color: var(--muted); font-size: .68rem; line-height: 1.5; max-width: 80ch; }
  .ex-row { display: flex; gap: 10px; align-items: stretch; }
  .ex-row code { flex: 1; overflow-x: auto; padding: 9px 13px; border: 1px solid var(--line); border-radius: 11px; background: #0a0f1b; font-family: var(--mono); font-size: .68rem; line-height: 1.75; color: var(--c2); white-space: pre; }
  .ex-actions { display: flex; flex-direction: column; gap: 6px; }
  .ex-actions button, .ex-actions a { display: block; padding: 6px 11px; border: 1px solid var(--line); border-radius: 9px; font-size: .6rem; font-weight: 700; text-align: center; text-decoration: none; white-space: nowrap; }
  .ex-actions button:hover, .ex-actions a:hover { border-color: var(--mv); color: var(--mv); }

  /* final practical stop */
  .example-grid { flex: 1; display: grid; grid-template-columns: repeat(3,minmax(160px,1fr)); gap: 14px; align-content: center; min-height: 260px; margin: 20px 0; }
  .example-card { padding: 18px; border: 1px solid color-mix(in srgb, var(--mv) 42%, var(--line)); border-radius: 13px; background: color-mix(in srgb, var(--mv) 6%, transparent); }
  .example-card small, .example-card b, .example-card span { display: block; }
  .example-card small { color: var(--mv); font-family: var(--mono); font-size: .62rem; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; }
  .example-card b { margin-top: 9px; font-family: var(--serif); font-size: 1.05rem; font-weight: 600; }
  .example-card span { margin-top: 8px; color: var(--muted); font-size: .78rem; line-height: 1.5; }
  .example-card a { display: inline-block; margin-top: 13px; color: var(--mv); font-family: var(--mono); font-size: .68rem; text-decoration: none; }
  .example-card a:hover { text-decoration: underline; }

  /* ================= footer ================= */
  footer { display: grid; grid-template-columns: minmax(300px,1fr) auto; gap: 20px; align-items: center; padding: 10px 20px; border-top: 1px solid var(--line); background: rgba(10,14,24,.98); }
  .prog { min-width: 0; }
  .prog-top { display: flex; gap: 10px; align-items: baseline; }
  .prog-top strong { font-family: var(--mono); font-size: .7rem; color: var(--mv); }
  .prog-top span { overflow: hidden; color: var(--muted); font-size: .62rem; white-space: nowrap; text-overflow: ellipsis; }
  .prog-bar { display: flex; gap: 2px; height: 8px; margin-top: 7px; border-radius: 5px; overflow: hidden; }
  .prog-bar i { flex: 1; background: rgba(255,255,255,.07); cursor: pointer; }
  .prog-bar i.passed { background: var(--seg); }
  .prog-bar i.at { outline: 1.5px solid #fff; outline-offset: -1.5px; }
  .keys { display: flex; gap: 13px; color: var(--faint); font-size: .58rem; white-space: nowrap; }
  .keys kbd { padding: 1px 6px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel); font-family: var(--mono); font-size: .56rem; color: var(--muted); }

  @media (max-width: 1000px) { .tabs .t-copy span { display: none; } }
  @media (max-width: 830px) { .app { min-width: 830px; overflow-x: auto; } }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <strong>Mira's Journey · <em>Engineering Agentic AI</em></strong>
      <small>From useful answers to dependable work</small>
    </div>
    <nav class="tabs" id="tabs" aria-label="Jump to a layer"></nav>
    <div class="stepper" role="group" aria-label="Navigation">
      <button class="play" id="play" type="button" aria-label="Play the journey slowly" title="Narration-aware timing · play or pause with Space">▶ Play slowly</button>
      <button id="prev" type="button" aria-label="Previous stop" title="Previous (←)">←</button>
      <span id="pos" aria-live="polite">setup</span>
      <button id="next" type="button" aria-label="Next stop" title="Next (→)">→</button>
    </div>
  </header>

  <main>
    <aside class="rail">
      <div class="mv-name" id="rail-name">Before you begin</div>
      <p class="mv-question" id="rail-question">One clone, then every chapter is a branch away.</p>
      <div class="rail-list" id="rail-list" role="listbox" aria-label="Stops in this layer"></div>
      <button class="rail-item rail-setup" id="go-setup" type="button"><span class="num" style="border-color:var(--faint);color:var(--faint)">0</span><b>Setup &amp; how to read</b></button>
    </aside>
    <section class="detail" id="detail" aria-live="polite"></section>
  </main>

  <footer>
    <div class="prog">
      <div class="prog-top"><strong id="progress-count">Setup</strong><span id="upnext">Use → to begin at 2:05 p.m.</span></div>
      <div class="prog-bar" id="prog-bar" aria-hidden="true"></div>
    </div>
    <div class="keys">
      <span><kbd>←</kbd><kbd>→</kbd> stop</span>
      <span><kbd>↑</kbd><kbd>↓</kbd> layer</span>
      <span><kbd>1</kbd>–<kbd>5</kbd> jump</span>
      <span><kbd>Space</kbd> play / pause</span>
      <span><kbd>C</kbd> copy</span>
    </div>
  </footer>
</div>

<script>
const repo = "https://github.com/topcoder-04/engineering-agentic-ai-companion";
const movements = [
  { roman:"I", start:1, end:7, hex:"#55d9ff", short:"Controlled work",
    name:"Controlled work",
    question:"How does a plausible answer become bounded, executable work?" },
  { roman:"II", start:8, end:14, hex:"#63e59a", short:"Reliable work",
    name:"Reliable work",
    question:"Can the investigation survive retries, uncertainty, and untrusted inputs?" },
  { roman:"III", start:15, end:21, hex:"#ffd166", short:"Governed effects",
    name:"Governed effects",
    question:"Who approved the effect, whose authority does it carry, and what must hold at the write?" },
  { roman:"IV", start:22, end:28, hex:"#ff82aa", short:"Judged operations",
    name:"Judged operations",
    question:"Can the whole journey be judged, released, observed, and improved?" },
  { roman:"V", start:29, end:37, hex:"#b99aff", short:"Operable platform",
    name:"Operable platform",
    question:"What proof must every agent carry before the platform lets it launch?" },
];

/* Chapter data. Titles are the manuscript's own chapter titles.
   story / change are paraphrased summaries of each chapter's opening pressure
   and its "What changed" outcome. cmd lines follow the book's Try-it blocks,
   verified against the companion repository. */
const DEMO = n => `python -m orders_investigation.demo chapter-${String(n).padStart(2,"0")}`;
const EX = n => `python examples/chapter_${String(n).padStart(2,"0")}.py`;
const PT = n => `python -m pytest tests/test_chapter_${String(n).padStart(2,"0")}.py`;
const PIP = `python -m pip install -e '.[test]'`;

const chapters = [
{n:1, t:"When a Good Answer Is Not the Work", refusal:"False completion",
 story:"At 2:05 p.m., orders-api starts timing out. CPU looks normal, but database write latency is forty times its baseline. Mira writes a solid incident update. The investigation is still nowhere near done.",
 change:"Mira separates what she knows from what she thinks. The run finishes only when the missing evidence is collected and the report write succeeds.",
 cmd:[DEMO(1)]},
{n:2, t:"What This Investigation May Touch", refusal:"Out-of-scope work",
 story:"The next clue could be in service metrics, database monitoring, job history, or deployment records. Some of those sources are useful. Not all of them are allowed.",
 change:"The investigation names exactly what it may inspect. Anything outside that boundary is rejected before work begins.",
 cmd:[DEMO(2)]},
{n:3, t:"When Permitted Work Still Wastes Time", refusal:"Unknown actions",
 story:"Four checks are ready: topology, connection pool, dependency health, and error rate. All four are allowed. Mira still has to choose which one is worth doing next.",
 change:"The model chooses only from ready, permitted work. Deterministic code keeps control of what actually runs.", live:true,
 cmd:[DEMO(3), PT(3)]},
{n:4, t:"When Evidence Changes the Shape of the Work", refusal:"Invented tasks",
 story:"The topology check finds something new: writes and reads go to different nodes. That fact changes what the investigation needs to do next.",
 change:"Recorded evidence may add the next bounded task. Failed or missing evidence cannot invent one.",
 cmd:[DEMO(4)]},
{n:5, t:"What the Model Sees and What May Run", refusal:"Malformed proposals",
 story:"The graph now contains work that did not exist at the start. Mira needs a clean answer to two questions: what does the model see, and what is the system willing to run?",
 change:"The model receives one explicit decision surface. Its proposal must pass a typed admission check, and current recorded state always wins.", live:true,
 cmd:[DEMO(5), PT(5)]},
{n:6, t:"When Judgment Becomes a Dependency", refusal:"Endless exploration",
 story:"Every model choice costs time and money. Without a limit, a reasonable investigation can keep exploring forever.",
 change:"The run gets a fixed judgment budget and a fallback. When the budget is gone, exploration stops cleanly.",
 cmd:[DEMO(6), PT(6)]},
{n:7, t:"Keeping Changed Work Alive After a Restart", refusal:"Restarted work",
 story:"Three observations in, the process dies. The replacement must continue with the same graph, evidence, and remaining budget.",
 change:"The workflow checkpoints changed state and resumes from it. A restart no longer means starting the investigation again.",
 cmd:[DEMO(7)]},
{n:8, t:"Trying Again Without Doing It Twice", refusal:"Duplicate writes",
 story:"After the restart, the report update still looks pending. The report service already accepted it. A blind retry would publish it twice.",
 change:"Every effect gets a stable identity before it is sent. Retrying the same effect is safe; reusing that identity for different work is refused.",
 cmd:[DEMO(8)]},
{n:9, t:"When an Attempt Ends but Its Effect Is Unknown", refusal:"Blind retries",
 story:"Mira sends the update and gets no response before the deadline. The request ended. Nobody yet knows whether the update happened.",
 change:"Unknown is recorded as a real outcome. The system checks authoritative state before deciding whether to retry.",
 cmd:[DEMO(9)]},
{n:10, t:"Carrying Forward Only What Helps", refusal:"Context sprawl",
 story:"A later incident looks familiar. Notes from the earlier Orders investigation may help, but dumping the old run into the new one would create more noise than signal.",
 change:"Memory is filtered by scope and limited before it reaches the model. It stays clearly separate from current evidence.",
 cmd:[DEMO(10)]},
{n:11, t:"Keeping a Long Investigation on Course", refusal:"Mission drift",
 story:"Several next steps look reasonable, but some of them quietly answer a different question. The investigation is starting to drift.",
 change:"An explicit task spine keeps the current question in charge. Unrelated work can be recorded without taking over the investigation.",
 cmd:[DEMO(11)]},
{n:12, t:"Sharing Work Without Losing Ownership", refusal:"Orphaned work",
 story:"Two workers load the same run and see the same task ready. Both are capable of doing it. Only one should own the result.",
 change:"A worker claims a task with an expiry and fencing token. Stale owners cannot commit after another worker takes over.",
 cmd:[DEMO(12)]},
{n:13, t:"Depending on Systems That May Be Wrong", refusal:"Injected commands",
 story:"The deployment pipeline returns valid JSON. Some fields contain instructions instead of facts. Valid syntax does not make the source trustworthy.",
 change:"Dependency results become typed evidence with provenance and quality checks. Instruction-like content is quarantined instead of entering the evidence stream.",
 cmd:[DEMO(13)]},
{n:14, t:"Running Generated Work Inside a Boundary", refusal:"Boundary escape",
 story:"No existing tool can compare writer pressure with the migration start time, so the model generates a small analysis. That code must not inherit the investigation's authority.",
 change:"Generated work runs inside a fixed sandbox. Its output comes back as untrusted data, never as a command.", docker:true,
 cmd:[DEMO(14), PT(14)]},
{n:15, t:"Choosing How Much Judgment a Decision Needs", refusal:"Weak approval",
 story:"The run made 1,842 model calls. Most of them only chose one task from a short list, yet every call used the strongest model.",
 change:"Each decision states the capability and data handling it needs. The system chooses a suitable model or refuses when none qualifies.",
 cmd:[DEMO(15), PT(15)]},
{n:16, t:"When New Evidence Changes What Comes Next", refusal:"Stale plans",
 story:"The model proposes throttling the migration. Before the plan runs, new evidence changes the situation.",
 change:"Plans name the evidence they depend on. Replanning replaces only future work, and late results from the old plan are rejected.",
 cmd:[DEMO(16), PT(16)]},
{n:17, t:"When Useful Contributions Do Not Add Up", refusal:"Partial completion",
 story:"Two specialists check recovery. One looks at writer capacity; the other looks at customer timeouts. Both answers matter, but neither proves recovery alone.",
 change:"Each specialist gets a precise assignment. Compatible results can be joined, but a partial join cannot claim the investigation is complete.",
 cmd:[DEMO(17), PT(17)]},
{n:18, t:"Waiting Safely for a Consequential Decision", refusal:"Stale approval",
 story:"The report is ready to say customer impact is resolved. A person must approve that claim, possibly hours after the request was created.",

function domeSvg(builtUpTo, currentN, footLeft, footRight) {
  const mvHex = n => movements[mvIndexFor(n)].hex;
  let blocks = "", caps = "";

  BP_NODES.forEach(nd => {
    if (nd.n > builtUpTo && nd.n !== currentN) return;   /* the future stays invisible */
    const priorPart = currentN && mvIndexFor(nd.n) < mvIndexFor(currentN) ? " seg-prior" : "";
    const state = (nd.n === currentN ? "seg-current seg-arrive" : "seg-built") + priorPart;
    const hex = mvHex(nd.n);
    const lit = nd.n <= builtUpTo;
    const label = nd.n + "\u00b7" + nd.l;
    blocks += `<g class="seg ${state}" data-ch="${nd.n}">
      <title>Ch ${nd.n} \u2014 ${chapters[nd.n-1].t}</title>
      <rect class="blk" x="${nd.x}" y="${nd.y}" width="${nd.w}" height="${nd.h}" rx="4" stroke="${hex}"/>
      <text class="bp-label${label.length > 11 ? " long" : ""}" x="${nd.x + nd.w/2}" y="${nd.y + 12.5}" fill="${hex}">${label}</text>
      <rect class="win${lit ? " lit" : ""}" x="${nd.x + nd.w/2 - 3}" y="${nd.y + nd.h - 11}" width="6" height="7" rx="1"/>
    </g>`;
    if (nd.spire && nd.n <= builtUpTo) {
      blocks += `<circle class="beacon${builtUpTo >= 37 ? " go" : ""}" cx="490" cy="5" r="4"/>`;
    }
  });

  /* ground, soil, floor captions */
  caps += `<rect class="soil" x="160" y="196" width="660" height="46"/>`;
  for (let gx = 170; gx < 820; gx += 26) caps += `<line class="soil-hatch" x1="${gx}" y1="240" x2="${gx+14}" y2="200"/>`;
  caps += `<line class="ground" x1="160" y1="196" x2="820" y2="196"/>`;
  caps += `<text class="lane-cap" x="160" y="192" fill="rgba(255,255,255,.5)">GROUND \u00b7 THE 2:05 P.M. ORDERS INCIDENT</text>`;
  FLOORS.forEach(fl => {
    const m = movements[fl.part];
    if (builtUpTo >= m.start || (currentN && currentN >= m.start && currentN <= m.end))
      caps += `<text class="floor-cap" x="246" y="${fl.y + fl.h/2 + 2}" fill="${m.hex}">${fl.cap}</text>`;
  });

  return `
  <div class="viz"><svg viewBox="0 0 900 252" role="img" aria-label="The system grows through five layers: Controlled Work, Reliable Work, Governed Effects, Judged Operations, and Operable Platform.">
    ${caps}
    ${blocks}
    ${currentN ? `<text class="legend-cap" x="892" y="8" fill="var(--bad)" text-anchor="end">NOW IMPOSSIBLE: ${chapters[currentN-1].refusal.toUpperCase()}</text>` : ""}
    <text class="legend-cap" x="108" y="248" fill="var(--mv)">${footLeft}</text>
    <text class="legend-sub" x="892" y="248" text-anchor="end">${footRight}</text>
  </svg></div>`;
}

function renderRail() {
  const s = stops[cur];
  let mi = -1;
  if (s.type === "ch") mi = mvIndexFor(s.n);
  if (s.type === "wp") mi = mvIndexFor(waypoints[s.id].after);
  if (s.type === "examples") mi = 4;
  const m = mi >= 0 ? movements[mi] : null;
  $("rail-name").textContent  = s.type === "examples" ? "Run the examples" : s.type === "wp" ? waypoints[s.id].label : (m ? m.name : "Before you begin");
  $("rail-question").textContent = s.type === "examples" ? "Start with the complete success and refusal on main." : s.type === "wp" ? "Pause and replay the system built so far." : (m ? m.question : "One clone, then every chapter is a branch away.");
  const list = $("rail-list"); list.innerHTML = "";
  if (!m) return;
  for (let n = m.start; n <= m.end; n++) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "rail-item" + (s.type==="ch" && s.n===n ? " current" : "") + (n <= chapterAt(s) && !(s.type === "ch" && s.n === n) ? " passed" : "");
    b.innerHTML = `<span class="num">${n}</span><b>${chapters[n-1].t}</b>`;
    b.addEventListener("click", () => go(chIndex[n]));
    list.append(b);
  }
  const wp = Object.entries(waypoints).find(([k,w]) => w.after === m.end);
  if (wp) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "rail-item waypoint" + (s.type==="wp" && s.id===wp[0] ? " current" : "");
    b.innerHTML = `<span class="num"><span>◈</span></span><b>${wp[1].label}</b>`;
    b.addEventListener("click", () => go(wpIndex[wp[0]]));
    list.append(b);
  }
  if (m.end === 37) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "rail-item" + (s.type === "examples" ? " current" : "");
    b.innerHTML = `<span class="num">▶</span><b>Examples · run the system</b>`;
    b.addEventListener("click", () => go(examplesIndex));
    list.append(b);
  }
}

      <p class="change"><b>Mira adds:</b> ${c.change}</p>
      ${badges.length ? `<div class="badges">${badges.join("")}</div>` : ""}
      ${domeSvg(s.n, s.n, `NEW · CH ${pad(s.n)} — ${gate[s.n][0].toUpperCase()}`, `${s.n} of 37 blocks placed`)}
      <details class="try">
        <summary>Try yourself<span class="hint">chapter-${pad(s.n)} · predict → run → break one condition</span></summary>
        <div class="ex-body">
          <p class="ex-hint">Predict the outcome first, run it, then change one condition at a time and watch which boundary refuses.</p>
          <div class="ex-row">
            <code id="cmd">${cmd}</code>
            <div class="ex-actions">
              <button id="copy" type="button">Copy (C)</button>
              <a href="${repo}/tree/chapter-${pad(s.n)}" target="_blank" rel="noreferrer">Branch ↗</a>
              <a href="${repo}/blob/chapter-${pad(s.n)}/examples/chapter_${pad(s.n)}.py" target="_blank" rel="noreferrer">Example ↗</a>
            </div>
          </div>
        </div>
      </details>`;
  }
  d.querySelector("#copy").addEventListener("click", copyCommands);
  d.scrollTop = 0;
}

function renderFooter() {
  const s = stops[cur];
  const anchor = chapterAt(s);
  const passedThrough = s.type === "ch" ? s.n - 1 : anchor;
  $("progress-count").textContent = s.type === "ch" ? `Chapter ${s.n} / 37` : s.type === "wp" ? (s.id === "epilogue" ? "Epilogue" : "Waypoint") : s.type === "examples" ? "Examples" : "Setup";
  [...$("prog-bar").children].forEach((seg,i) => {
    seg.classList.toggle("passed", i + 1 <= passedThrough);
    seg.classList.toggle("at", s.type==="ch" && s.n===i+1);
  });
  const next = stops[cur + 1];
  $("upnext").textContent = next ? `Up next: ${next.type === "ch" ? `Ch. ${next.n} — ${chapters[next.n - 1].t}` : next.type === "wp" ? waypoints[next.id].title : "Examples — run the system"}` : "Journey complete.";
  $("pos").textContent = s.type==="setup" ? "setup" : s.type==="wp" ? "◈" : s.type === "examples" ? "examples" : `${pad(s.n)} / 37`;
  $("prev").disabled = cur === 0;
  $("next").disabled = cur === stops.length - 1;
  const mi = s.type==="ch" ? mvIndexFor(s.n) : s.type==="wp" ? mvIndexFor(waypoints[s.id].after) : s.type === "examples" ? 4 : -1;
  [...$("tabs").children].forEach((t,i) => {
    t.classList.toggle("current", i === mi);
    t.classList.toggle("progressed", anchor > movements[i].end);
  });
}

function syncHash() {
  const s = stops[cur];
  const hash = s.type === "ch" ? "chapter-" + pad(s.n) : s.type === "wp" ? (s.id === "epilogue" ? "epilogue" : "interlude-" + s.id.slice(3)) : s.type === "examples" ? "examples" : "";
  history.replaceState(null, "", hash ? "#" + hash : location.pathname + location.search);
}

function stopPlayback(replay = false) {
  if (playTimer) clearTimeout(playTimer);
  playTimer = null;
  const button = $("play");
  button.textContent = replay ? "↻ Replay slowly" : "▶ Play slowly";
  button.setAttribute("aria-label", replay ? "Replay the journey slowly" : "Play the journey slowly");
  button.setAttribute("aria-pressed", "false");
}

function playbackDelayFor(stop) {
  if (stop.type === "ch") return stop.n === 1 ? PLAY_DELAYS_MS.chapterOne : PLAY_DELAYS_MS.chapter;
  if (stop.type === "wp") return stop.id === "epilogue" ? PLAY_DELAYS_MS.epilogue : PLAY_DELAYS_MS.waypoint;
  if (stop.type === "examples") return PLAY_DELAYS_MS.examples;
  return PLAY_DELAYS_MS.chapterOne;
}

function schedulePlayback() {
  if (playTimer) clearTimeout(playTimer);
  playTimer = setTimeout(advancePlayback, playbackDelayFor(stops[cur]));
}

function advancePlayback() {
  if (cur >= stops.length - 1) {
    stopPlayback(true);
    return;
  }
  go(cur + 1, true);
  schedulePlayback();
}

function togglePlayback() {
  if (playTimer) {
    stopPlayback();
    return;
  }
  if (cur === 0 || cur >= stops.length - 1) go(chIndex[1], true);
  const button = $("play");
  button.textContent = "❚❚ Pause";
  button.setAttribute("aria-label", "Pause the journey");
  button.setAttribute("aria-pressed", "true");
  schedulePlayback();
}

function go(i, keepPlaying = false) {
  if (!keepPlaying) stopPlayback();
  cur = Math.max(0, Math.min(stops.length-1, i));
  renderRail(); renderDetail(); renderFooter(); syncHash();
}
async function copyCommands() {
  const text = $("cmd").textContent, btn = $("copy");
  try { await navigator.clipboard.writeText(text); }
  catch { const ta = document.createElement("textarea"); ta.value = text; document.body.append(ta); ta.select(); try { document.execCommand("copy"); } catch {} ta.remove(); }
  btn.textContent = "Copied"; setTimeout(() => btn.textContent = "Copy (C)", 1200);
}

$("prev").addEventListener("click", () => go(cur-1));
$("next").addEventListener("click", () => go(cur+1));
$("play").addEventListener("click", togglePlayback);
$("go-setup").addEventListener("click", () => go(0));
$("detail").addEventListener("click", e => {
  const seg = e.target.closest("[data-ch]");
  if (seg) go(chIndex[Number(seg.dataset.ch)]);
});

window.addEventListener("keydown", e => {
  if (e.target.closest("input, textarea") || e.metaKey || e.ctrlKey || e.altKey) return;
  const s = stops[cur];
  if (e.key === "ArrowRight") { e.preventDefault(); go(cur+1); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); go(cur-1); }
  else if (e.code === "Space") { e.preventDefault(); togglePlayback(); }
  else if (e.key === "ArrowDown") { e.preventDefault(); const mi = s.type==="ch" ? mvIndexFor(s.n) : s.type==="wp" ? mvIndexFor(waypoints[s.id].after) : s.type === "examples" ? 4 : -1; go(chIndex[movements[Math.min(4, mi+1)].start]); }
  else if (e.key === "ArrowUp") { e.preventDefault(); const mi = s.type==="ch" ? mvIndexFor(s.n) : s.type==="wp" ? mvIndexFor(waypoints[s.id].after)+1 : s.type === "examples" ? 5 : 0; go(mi <= 0 ? 0 : chIndex[movements[mi-1].start]); }
  else if (/^[1-5]$/.test(e.key)) go(chIndex[movements[Number(e.key)-1].start]);
  else if (e.key === "0") go(0);
  else if (e.key.toLowerCase() === "c") copyCommands();
});

/* restore: #chapter-NN, #interlude-N, #epilogue, #examples */
const cm = location.hash.match(/chapter-(\d{1,2})/);
const im = location.hash.match(/interlude-(\d)/);
go(cm ? chIndex[Math.max(1, Math.min(37, Number(cm[1])))] :
   im ? wpIndex["int"+im[1]] :
   location.hash.includes("epilogue") ? wpIndex.epilogue :
   location.hash.includes("examples") ? examplesIndex : chIndex[1]);
togglePlayback();
</script>
</body>
</html>
